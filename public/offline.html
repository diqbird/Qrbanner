<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004080" />
    <title>Offline — QRbanner</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f7fb;
        --fg: #0f172a;
        --muted: #64748b;
        --primary: #004080;
        --card: rgba(255, 255, 255, 0.82);
        --border: rgba(15, 23, 42, 0.08);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #e2e8f0;
          --muted: #94a3b8;
          --card: rgba(15, 23, 42, 0.82);
          --border: rgba(255, 255, 255, 0.1);
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(ellipse at 20% 0%, rgba(0, 64, 128, 0.18), transparent 45%),
          var(--bg);
        color: var(--fg);
      }
      .card {
        width: min(420px, 100%);
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--card);
        backdrop-filter: blur(16px);
        box-shadow: 0 24px 60px -28px rgba(0, 0, 0, 0.45);
        padding: 28px;
        text-align: center;
      }
      h1 { margin: 0; font-size: 1.5rem; letter-spacing: -0.02em; }
      p { margin: 12px 0 0; color: var(--muted); line-height: 1.5; }
      a {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 16px;
        border-radius: 12px;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You’re offline</h1>
      <p>QRbanner can’t reach the network right now. Open a cached dashboard when available, or retry when you’re back online.</p>
      <a href="/dashboard">Open cached dashboard</a>
    </main>
  </body>
</html>
