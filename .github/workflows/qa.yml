name: QA

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: yarn lint
      - name: Unit tests
        run: yarn test:unit
      - name: Build
        run: yarn build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Runs on push when PLAYWRIGHT_BASE_URL or E2E_AGAINST_PROD is set (see setup-github-deploy-secrets.py)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      vars.PLAYWRIGHT_BASE_URL != '' ||
      vars.E2E_AGAINST_PROD == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://qrbanner.com' }}
          CI: true
        run: yarn test:e2e

  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - uses: browser-actions/setup-chrome@v1
      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines
      - name: Run Lighthouse
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://qrbanner.com' }}
          CI: true
        run: node scripts/lighthouse-audit.mjs
